<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>大工AI計算チャット</title>
<style>
:root{
  --bg:#faf5e8;--bg2:#f0e8d0;--bg3:#e8dcc0;--border:#d4c090;
  --accent:#c17f24;--text:#2a1a08;--text2:#5a3a10;--text3:#8a6030;
  --green:#1a7030;--blue:#1a3a80;--red:#8a1010;
  --ai-bg:#f0f6ff;--user-bg:#1a3a70;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* ── ヘッダー ── */
.app-header{background:linear-gradient(135deg,#2a1a08,#5a3010);color:#f5e8c8;padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.app-header h1{font-size:15px;font-weight:700;flex:1;}
.header-btn{background:rgba(255,255,255,.15);border:none;color:#f5e8c8;font-size:11px;padding:5px 10px;border-radius:10px;cursor:pointer;}

/* ── プリセットバー ── */
.preset-bar{background:#fff;border-bottom:2px solid var(--border);padding:8px 10px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.preset-bar::-webkit-scrollbar{display:none;}
.preset-chip{flex-shrink:0;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.preset-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.preset-chip:active{transform:scale(.95);}

/* ── 入力フォームパネル ── */
.form-panel{background:#fff;border-bottom:1px solid var(--border);padding:10px 12px;flex-shrink:0;display:none;}
.form-panel.open{display:block;}
.form-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:10px;color:var(--text3);font-weight:600;}
.form-input{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);outline:none;width:100%;}
.form-input:focus{border-color:var(--accent);background:#fff;}
.form-select{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;width:100%;}
.calc-send-btn{margin-top:8px;width:100%;padding:11px;background:linear-gradient(135deg,#2a1a08,var(--accent));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.calc-send-btn:active{opacity:.85;}

/* ── チャットエリア ── */
.chat-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:#e8f0f8;border:1px solid var(--border);}
.msg.user .avatar{background:rgba(26,58,112,.15);}
.bubble{max-width:88%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.msg.bot .bubble{background:#fff;border:1px solid var(--border);border-radius:4px 14px 14px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.msg.user .bubble{background:linear-gradient(135deg,#1a3a70,#2a5ab0);color:#fff;border-radius:14px 4px 14px 14px;}

/* 計算結果カード */
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-top:4px;}
.result-card-header{background:linear-gradient(135deg,#2a1a08,#5a3010);color:#f5e8c8;padding:8px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.result-rows{padding:8px 0;}
.result-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 12px;border-bottom:1px dashed #e8dcc0;gap:8px;cursor:pointer;}
.result-row:last-child{border-bottom:none;}
.result-row:active{background:#fff8e8;}
.r-label{font-size:11px;color:var(--text3);flex:1;}
.r-val{font-size:18px;font-weight:700;color:var(--accent);}
.r-unit{font-size:11px;color:var(--text3);margin-left:2px;}
.r-copy{font-size:9px;color:#ccc;margin-left:3px;}
.result-note{padding:6px 12px;font-size:11px;color:var(--text3);background:var(--bg2);border-top:1px solid var(--border);}
.result-actions{display:flex;gap:6px;padding:8px 12px;}
.r-act-btn{flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;}
.r-act-btn.primary{background:linear-gradient(135deg,#1a3a70,#2a5ab0);color:#fff;border:none;}

/* SVGカード */
.svg-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:6px;}
.svg-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;}

/* typing */
.typing{display:flex;gap:4px;padding:2px 0;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:td .9s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* クイックボタン */
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;padding:4px 0;}
.qbtn{font-size:11px;padding:5px 9px;border:1px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;}
.qbtn:active{background:var(--accent);color:#fff;}

/* ── 入力バー ── */
.inp-bar{background:#fff;border-top:1px solid var(--border);padding:8px 10px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.inp-ta{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:9px 11px;font-size:14px;resize:none;outline:none;line-height:1.5;max-height:90px;min-height:40px;font-family:inherit;color:var(--text);}
.inp-ta:focus{border-color:var(--accent);background:#fffdf5;}
.send-btn{background:linear-gradient(135deg,#2a1a08,var(--accent));color:#fff;border:none;border-radius:10px;width:46px;height:46px;font-size:20px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{background:var(--bg3);}

/* モード切替バー */
.mode-bar{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.mode-btn{flex:1;padding:8px 4px;border:none;background:none;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-top:2px solid transparent;}
.mode-btn.active{color:var(--accent);border-top-color:var(--accent);}

/* ── ログイン ── */
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#2a1a08,#5a3010);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;width:calc(100% - 40px);max-width:360px;}
.login-logo{text-align:center;font-size:48px;margin-bottom:8px;}
.login-title{text-align:center;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:20px;}
.login-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;}
.login-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#2a1a08,var(--accent));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-err{color:#c03020;font-size:12px;text-align:center;margin-top:8px;min-height:16px;}
</style>
</head>

<script>
// ============================================================
//  設定
// ============================================================
var FUNCTIONS_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ?'http://localhost:5001/kensetsu-nippo-842a2/us-central1'
  :'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';

var _mode='chat';
var _preset='free';
var _hist=[];
var _busy=false;

// ============================================================
//  プリセット定義
// ============================================================
var PRESETS={
  free:{
    label:'💬 自由相談',
    formHTML:'',
    quickBtns:['準防火住宅の外壁仕様','ファイヤーストップの位置','木造在来工法の金物種類','防水工事の種類と違い','建築基準法の階段基準'],
    systemPrompt:function(v){
      return '【大工AI建築設計士】あなたは日本最高レベルの木造建築設計士兼ベテラン大工です。\n'
        +'木造在来工法・新築住宅・法令（建築基準法・施行令・告示）・施工・材料・金物・継手・仕口に精通しています。\n'
        +'日本語で現場で役立つ具体的・実践的な回答をしてください。数値・法令根拠・条文番号も明示してください。\n'
        +'Google検索で最新情報を確認してください。';
    }
  },
  kobai:{
    label:'🏠 屋根勾配計算',
    formHTML:function(){return `
      <div class="form-title">🏠 屋根勾配計算</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">勾配（寸）</label><input class="form-input" id="f-kobai" type="number" placeholder="4.5" step="0.5" value="4"></div>
        <div class="form-group"><label class="form-label">軒の出・水平距離(mm)</label><input class="form-input" id="f-suihei" type="number" placeholder="450" value="450"></div>
        <div class="form-group"><label class="form-label">モジュール</label>
          <select class="form-select" id="f-module"><option value="910">910mm</option><option value="900">900mm</option></select></div>
        <div class="form-group"><label class="form-label">柱幅(mm)</label><input class="form-input" id="f-hashira" type="number" placeholder="105" value="105"></div>
        <div class="form-group full"><label class="form-label">部材長さ計算の基準(mm) ※屋根スパン</label><input class="form-input" id="f-span" type="number" placeholder="例：3640"></div>
      </div>
      <button class="calc-send-btn" onclick="calcAndSend('kobai')">🤖 AI計算・解析</button>`;
    },
    quickBtns:['垂木の本数と寸法','隅木の長さと勾配','破風・鼻隠しの長さ','棟木・母屋の配置','軒先の納まり'],
    calc:function(v){
      var kobai=v.kobai,suihei=v.suihei,mod=v.module,hashira=v.hashira,span=v.span;
      var angle=Math.atan(kobai/10)*180/Math.PI;
      var斜辺係数=Math.sqrt(1+(kobai/10)*(kobai/10));
      var noki斜長=Math.round(suihei*斜辺係数*10)/10;
      var tarukiPitch=Math.round(mod/3)/1;// 303または300
      var tarukiCnt=span?Math.ceil(span/tarukiPitch)+1:null;
      var棟からの水平=span?span/2:null;
      var棟高=span?Math.round(span/2*kobai/10):null;
      return {
        items:[
          {label:'勾配角度',value:Math.round(angle*100)/100,unit:'度'},
          {label:'斜辺係数（×水平距離）',value:Math.round(斜辺係数*10000)/10000,unit:''},
          {label:'軒先 斜辺長さ',value:noki斜長,unit:'mm'},
          {label:'垂木ピッチ目安',value:tarukiPitch,unit:'mm'},
        ].concat(tarukiCnt?[{label:'垂木本数目安（スパン'+span+'mm）',value:tarukiCnt,unit:'本'}]:[])
         .concat(棟高?[{label:'棟の高さ（スパン÷2×勾配）',value:棟高,unit:'mm'}]:[]),
        note:'勾配'+kobai+'寸 / 軒出'+suihei+'mm / 斜辺係数'+Math.round(斜辺係数*10000)/10000
      };
    },
    systemPrompt:function(v,calcResult){
      return '【大工AI建築設計士：屋根勾配計算】\n'
        +'入力値：勾配'+v.kobai+'寸、軒の出'+v.suihei+'mm、モジュール'+v.module+'mm、柱幅'+v.hashira+'mm\n'
        +(v.span?'スパン:'+v.span+'mm\n':'')
        +'計算結果:\n'+calcResult+'\n\n'
        +'上記の計算結果をもとに：\n'
        +'1. 計算値の現場での使い方を具体的に説明\n'
        +'2. 垂木・隅木・破風・鼻隠しの施工手順と注意点\n'
        +'3. この勾配に関する法令上の注意点（軒の出・防火など）\n'
        +'4. 材料の拾い出しポイント\n'
        +'Google検索で最新の規格・告示も確認してください。';
    },
    svg:function(v){return genKobaiSVG(v.kobai,v.suihei);}
  },
  tenjo:{
    label:'🏠 天井下地計算',
    formHTML:function(){return `
      <div class="form-title">🏠 天井下地計算</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">部屋の長さ(mm)</label><input class="form-input" id="f-length" type="number" placeholder="3640" value="3640"></div>
        <div class="form-group"><label class="form-label">部屋の幅(mm)</label><input class="form-input" id="f-width" type="number" placeholder="2730" value="2730"></div>
        <div class="form-group"><label class="form-label">モジュール</label>
          <select class="form-select" id="f-module"><option value="910">910mm</option><option value="900">900mm</option></select></div>
        <div class="form-group"><label class="form-label">柱幅(mm)</label><input class="form-input" id="f-hashira" type="number" placeholder="105" value="105"></div>
        <div class="form-group"><label class="form-label">野縁ピッチ(mm)</label>
          <select class="form-select" id="f-noken"><option value="303">303mm</option><option value="300">300mm</option></select></div>
        <div class="form-group"><label class="form-label">野縁受けピッチ(mm)</label>
          <select class="form-select" id="f-nokenjuke"><option value="910">910mm</option><option value="900">900mm</option></select></div>
      </div>
      <button class="calc-send-btn" onclick="calcAndSend('tenjo')">🤖 AI計算・解析</button>`;
    },
    quickBtns:['吊木の配置と間隔','野縁の継手位置','ボード割付の考え方','防火の場合の注意点','勾配天井の場合'],
    calc:function(v){
      var len=v.length,wid=v.width,mod=v.module,hash=v.hashira,np=v.noken,njp=v.nokenjuke;
      var naihoL=len-hash*2;var naihoW=wid-hash*2;
      var nokenCnt=Math.floor(naihoW/np)+2;
      var nokenjukeCnt=Math.floor(naihoL/njp)+2;
      var nokenTotal=nokenCnt;
      var menseki=Math.round(len*wid/1000000*100)/100;
      return {
        items:[
          {label:'部屋面積',value:menseki,unit:'m²'},
          {label:'野縁方向 有効長（長さ-柱-70）',value:naihoL-70,unit:'mm'},
          {label:'野縁受け方向 最終位置（幅-柱）',value:naihoW,unit:'mm'},
          {label:'野縁 本数目安',value:nokenCnt,unit:'本'},
          {label:'野縁受け 本数目安',value:nokenjukeCnt,unit:'本'},
          {label:'吊木 本数目安',value:nokenjukeCnt*Math.ceil(naihoL/910),unit:'本'},
        ],
        note:'野縁ピッチ'+np+'mm / 野縁受けピッチ'+njp+'mm'
      };
    },
    systemPrompt:function(v,calcResult){
      return '【大工AI建築設計士：天井下地計算】\n'
        +'入力値：長さ'+v.length+'mm×幅'+v.width+'mm、モジュール'+v.module+'mm、柱幅'+v.hashira+'mm\n'
        +'野縁ピッチ'+v.noken+'mm、野縁受けピッチ'+v.nokenjuke+'mm\n'
        +'計算結果:\n'+calcResult+'\n\n'

// ============================================================
//  計算ロジック（純粋関数）
// ============================================================
function runCalc(presetId){
  var p=PRESETS[presetId];
  if(!p||!p.calc)return null;
  var v=getFormValues(presetId);
  return p.calc(v);
}

function getFormValues(presetId){
  var v={};
  var ids=['kobai','suihei','module','hashira','span','length','width','noken','nokenjuke',
           'floor','fummen','steps','kengu','board','clear','beam','shape','count',
           'tate','yoko','tenjoh','kaiko-type'];
  ids.forEach(function(id){
    var el=document.getElementById('f-'+id);
    if(el){
      var val=el.value;
      v[id.replace('-','')]=isNaN(parseFloat(val))?val:parseFloat(val)||val;
    }
  });
  // 特殊
  var ktEl=document.getElementById('f-kaiko-type');
  if(ktEl)v.kaikoType=ktEl.value;
  return v;
}

// ============================================================
//  SVG図面生成
// ============================================================
function genKobaiSVG(kobai,suihei){
  if(!kobai)return '';
  var w=300,h=180,pad=30;
  var bW=w-pad*2,bH=Math.min(bW*(kobai/10),h-pad*2-30);
  var x0=pad,y0=pad+bH+20,x1=pad+bW/2,y1=pad+20,x2=pad+bW,y2=y0;
  var s='<svg width="'+w+'" height="'+h+'" style="border:1px solid #ddd;border-radius:8px;background:#fff;display:block;margin:0 auto;">';
  s+='<polygon points="'+x0+','+y0+' '+x1+','+y1+' '+x2+','+y2+'" fill="#e8f0e8" stroke="#2a6020" stroke-width="1.5"/>';
  s+='<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y1+'" stroke="#c03020" stroke-width="3"/>';
  s+='<line x1="'+(x2-50)+'" y1="'+y0+'" x2="'+x2+'" y2="'+y0+'" stroke="#1a5090" stroke-width="3"/>';
  s+='<text x="'+((x0+x1)/2-15)+'" y="'+((y0+y1)/2)+'" font-size="10" fill="#c03020">破風</text>';
  s+='<text x="'+(x2-45)+'" y="'+(y0-8)+'" font-size="10" fill="#1a5090">鼻隠し</text>';
  s+='<text x="'+(x0+8)+'" y="'+(y0-8)+'" font-size="9" fill="#555">勾配'+kobai+'寸  軒'+suihei+'mm</text>';
  s+='<text x="'+(w/2)+'" y="15" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a3060">屋根断面概略図</text>';
  s+='</svg>';
  return s;
}

function genTenjoSVG(np,njp){
  np=np||303;njp=njp||910;
  var w=300,h=210,pad=32,aW=w-pad*2,aH=h-pad*2;
  var scale=Math.min(aW/3640,aH/2730)*0.9;
  var s='<svg width="'+w+'" height="'+h+'" style="border:1px solid #ddd;border-radius:8px;background:#fff;display:block;margin:0 auto;">';
  s+='<rect x="'+pad+'" y="'+pad+'" width="'+aW+'" height="'+aH+'" fill="#fffef0" stroke="#8a6020" stroke-width="2"/>';
  for(var j=0;j<=Math.ceil(aH/(njp*scale));j++){var y=pad+j*njp*scale;if(y>pad+aH)break;s+='<line x1="'+pad+'" y1="'+y+'" x2="'+(pad+aW)+'" y2="'+y+'" stroke="#c06020" stroke-width="2.5"/>';}
  for(var i=0;i<=Math.ceil(aW/(np*scale));i++){var x=pad+i*np*scale;if(x>pad+aW)break;s+='<line x1="'+x+'" y1="'+pad+'" x2="'+x+'" y2="'+(pad+aH)+'" stroke="#3a8040" stroke-width="1.2"/>';}
  s+='<line x1="'+(pad+4)+'" y1="'+(pad+aH+14)+'" x2="'+(pad+22)+'" y2="'+(pad+aH+14)+'" stroke="#c06020" stroke-width="2.5"/>';
  s+='<text x="'+(pad+25)+'" y="'+(pad+aH+18)+'" font-size="9" fill="#c06020">野縁受け'+njp+'mm</text>';
  s+='<line x1="'+(pad+130)+'" y1="'+(pad+aH+14)+'" x2="'+(pad+148)+'" y2="'+(pad+aH+14)+'" stroke="#3a8040" stroke-width="1.5"/>';
  s+='<text x="'+(pad+151)+'" y="'+(pad+aH+18)+'" font-size="9" fill="#3a8040">野縁'+np+'mm</text>';
  s+='<text x="'+(w/2)+'" y="15" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a3060">天井下地割付概略図</text>';
  s+='</svg>';
  return s;
}

function genBousuiSVG(tp,yp){
  tp=tp||303;yp=yp||910;
  var w=280,h=190,pad=28;
  var aW=w-pad*2,aH=h-pad*2;
  var scaleX=aW/910,scaleY=aH/910;
  var s='<svg width="'+w+'" height="'+h+'" style="border:1px solid #ddd;border-radius:8px;background:#fff;display:block;margin:0 auto;">';
  s+='<rect x="'+pad+'" y="'+pad+'" width="'+aW+'" height="'+aH+'" fill="#f0f8ff" stroke="#4a7ab8" stroke-width="1.5"/>';
  for(var i=0;i<=Math.ceil(910/tp)+1;i++){var x=pad+i*tp*scaleX;if(x>pad+aW+1)break;s+='<line x1="'+x+'" y1="'+pad+'" x2="'+x+'" y2="'+(pad+aH)+'" stroke="#2a5a90" stroke-width="1"/>';}
  for(var j=0;j<=Math.ceil(910/yp)+1;j++){var y=pad+j*yp*scaleY;if(y>pad+aH+1)break;s+='<line x1="'+pad+'" y1="'+y+'" x2="'+(pad+aW)+'" y2="'+y+'" stroke="#2a5a90" stroke-width="1"/>';}
  s+='<text x="'+(w/2)+'" y="15" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a3060">防水下地割付　縦'+tp+'mm×横'+yp+'mm</text>';
  s+='</svg>';
  return s;
}

// ============================================================
//  UI操作
// ============================================================
function selectPreset(id){
  _preset=id;
  document.querySelectorAll('.preset-chip').forEach(function(c){
    c.classList.toggle('active',c.dataset.id===id);
  });
  var p=PRESETS[id];
  var panel=document.getElementById('formPanel');
  if(!p)return;
  if(p.formHTML&&typeof p.formHTML==='function'){
    panel.innerHTML=p.formHTML();
    panel.classList.add('open');
  } else {
    panel.innerHTML='';
    panel.classList.remove('open');
    // 自由相談・法令はquickボタンをチャットに追加
    showQuickBtns(p.quickBtns);
  }
}

function showQuickBtns(btns){
  if(!btns||!btns.length)return;
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');
  div.className='msg bot';
  var av=document.createElement('div');av.className='avatar';av.textContent='🏗️';
  var bub=document.createElement('div');bub.className='bubble';
  bub.innerHTML='<div class="quick-btns">'
    +btns.map(function(b){return '<button class="qbtn" onclick="mainSend(\''+b+'\')">'+b+'</button>';}).join('')
    +'</div>';
  div.appendChild(av);div.appendChild(bub);
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function setMode(m){
  _mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('mode-'+m).classList.add('active');
  var inp=document.getElementById('mainInput');
  var placeholders={chat:'質問・相談を入力…',calc:'例：4.5寸勾配で水平1820mmの斜辺は？',search:'例：2025年省エネ基準改正の内容は？'};
  inp.placeholder=placeholders[m]||'入力…';
}

// ============================================================
//  計算→AI送信
// ============================================================
async function calcAndSend(presetId){
  var p=PRESETS[presetId];
  if(!p)return;
  var v=getFormValues(presetId);
  var result=null;
  var resultText='';
  var svgHTML='';

  // 計算実行
  if(p.calc){
    try{
      result=p.calc(v);
      if(result&&result.items){
        resultText=result.items.map(function(i){return i.label+': '+i.value+(i.unit||'');}).join('\n');
        if(result.note)resultText+='\n'+result.note;
      }
    }catch(e){resultText='計算エラー: '+e.message;}
  }

  // 計算結果カード表示
  if(result&&result.items){
    appendResultCard(result,presetId);
  }

  // SVG図面
  if(p.svg){
    try{svgHTML=p.svg(v);}catch(e){}
    if(svgHTML) appendSVGCard(svgHTML,p.label);
  }

  // AIに送信
  var prompt=p.systemPrompt(v,resultText);
  await sendToAI(prompt,true);
}

// ============================================================
//  チャット送信
// ============================================================
async function mainSend(quickText){
  var inp=document.getElementById('mainInput');
  var text=(quickText||(inp?inp.value:'')).trim();
  if(!text||_busy)return;
  if(!quickText){inp.value='';inp.style.height='';}

  appendMsg('user',text);
  _hist.push({role:'user',content:text});

  var p=PRESETS[_preset]||PRESETS.free;
  var useSearch=(_mode==='search'||_mode==='chat');
  var sys='';

  if(_mode==='calc'){
    sys='あなたは計算専門AIです。日本語で答えてください。建設・大工計算（勾配・斜辺・面積・坪・材料費・モジュール）も得意です。\n計算結果がある場合必ずこの形式を含めてください：RESULT_JSON:{"value":"数値のみ","expression":"計算式"}';
    useSearch=false;
  } else if(_mode==='search'){
    sys='あなたは建築・住宅・大工・施工に関する最新情報を調べるAIです。Google検索で法令改正・補助金・規格の最新情報を提供してください。情報源・施行日・出典も明示してください。';
  } else {
    sys=p.systemPrompt({});
  }

  var hist=_hist.slice(-8).map(function(h){return h.role+': '+h.content;}).join('\n');
  var fullPrompt=sys+'\n\n会話履歴:\n'+hist+'\n\nユーザー: '+text;
  await sendToAI(fullPrompt,useSearch,_mode==='calc');
}

async function sendToAI(prompt,useSearch,isCalc){
  var typEl=appendTyping();
  _busy=true;document.getElementById('sendBtn').disabled=true;
  try{
    var body={prompt:prompt,model:'gemini-2.5-flash',useSearch:!!useSearch};
    var res=await fetch(FUNCTIONS_BASE+'/askClaude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    var data=await res.json();
    var resp=data?.candidates?.[0]?.content?.parts?.[0]?.text||data?.text||data?.result||'応答なし';
    typEl.remove();
    var calcResult=null;
    if(isCalc){
      var m=resp.match(/RESULT_JSON:(\{[^}]+\})/);
      if(m){try{calcResult=JSON.parse(m[1]);}catch(e){}}
      resp=resp.replace(/RESULT_JSON:\{[^}]+\}/g,'').trim();
    }
    _hist.push({role:'assistant',content:resp.slice(0,500)});
    appendMsg('bot',resp,calcResult);
  }catch(err){
    typEl.remove();
    appendMsg('bot','⚠️ エラー: '+err.message);
  }
  _busy=false;document.getElementById('sendBtn').disabled=false;
}

// ============================================================
//  メッセージUI
// ============================================================
function appendMsg(role,text,calcResult){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');div.className='msg '+role;
  var av=document.createElement('div');av.className='avatar';av.textContent=role==='user'?'👤':'🏗️';
  var bub=document.createElement('div');bub.className='bubble';bub.textContent=text;
  if(calcResult&&calcResult.value){
    var chip=document.createElement('div');
    chip.style.cssText='display:inline-flex;align-items:center;gap:7px;background:#e8f8f0;border:1px solid #a0d0b0;border-radius:10px;padding:7px 12px;margin-top:7px;cursor:pointer;';
    chip.innerHTML='<span>📊</span><div><div style="font-size:18px;font-weight:700;color:#1a6a30;">'+calcResult.value+'</div><div style="font-size:10px;color:#3a7a52;">タップしてコピー</div></div>';
    chip.onclick=function(){try{navigator.clipboard.writeText(calcResult.value);}catch(e){}chip.querySelector('div div:last-child').textContent='✅ コピーしました';setTimeout(function(){chip.querySelector('div div:last-child').textContent='タップしてコピー';},1800);};
    bub.appendChild(chip);
  }
  div.appendChild(av);div.appendChild(bub);
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function appendResultCard(result,presetId){
  var area=document.getElementById('chatArea');
  var p=PRESETS[presetId];
  var div=document.createElement('div');div.className='msg bot';
  var av=document.createElement('div');av.className='avatar';av.textContent='📊';
  var card=document.createElement('div');card.className='result-card';
  card.innerHTML='<div class="result-card-header">📊 '+p.label+' 計算結果</div>'
    +'<div class="result-rows">'
    +result.items.map(function(i){
      var copyVal=String(i.value)+(i.unit||'');
      return '<div class="result-row" onclick="copyRowVal(this)"'
        +' data-copy="'+copyVal+'">'
        +'<span class="r-label">'+i.label+'</span>'
        +'<span><span class="r-val">'+i.value+'</span><span class="r-unit">'+(i.unit||'')+'</span><span class="r-copy">📋</span></span>'
        +'</div>';
    }).join('')
    +'</div>'
    +(result.note?'<div class="result-note">'+result.note+'</div>':'')
    +'<div class="result-actions">'
    +'<button class="r-act-btn" onclick="copyAllResult(this)">📋 全コピー</button>'
    +'</div>';
  div.appendChild(av);div.appendChild(card);
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function appendSVGCard(svgHTML,label){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');div.className='msg bot';
  var av=document.createElement('div');av.className='avatar';av.textContent='📐';
  var card=document.createElement('div');card.className='svg-card';
  card.innerHTML='<div class="svg-title">📐 '+label+' 簡易図面</div>'+svgHTML
    +'<div style="font-size:10px;color:#aaa;margin-top:4px;">※概略図。実施工は計算値で確認してください。</div>';
  div.appendChild(av);div.appendChild(card);
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

function appendTyping(){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');div.className='msg bot';
  div.innerHTML='<div class="avatar">🏗️</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;return div;
}

function copyRowVal(row){
  var val=row.dataset.copy||'';
  try{navigator.clipboard.writeText(val);}catch(e){}
  var cp=row.querySelector('.r-copy');
  if(cp){cp.textContent='✅';setTimeout(function(){cp.textContent='📋';},1200);}
}

function copyAllResult(btn){
  var card=btn.closest('.result-card');
  if(!card)return;
  var rows=card.querySelectorAll('.result-row');
  var text=Array.from(rows).map(function(r){
    var label=r.querySelector('.r-label');var val=r.querySelector('.r-val');var unit=r.querySelector('.r-unit');
    return (label?label.textContent:'')+': '+(val?val.textContent:'')+(unit?unit.textContent:'');
  }).join('\n');
  try{navigator.clipboard.writeText(text);}catch(e){}
  btn.textContent='✅ コピーしました';setTimeout(function(){btn.textContent='📋 全コピー';},1500);
}

function clearChat(){
  document.getElementById('chatArea').innerHTML='';
  _hist=[];
  // ウェルカム再表示
  appendMsg('bot','チャットをクリアしました。プリセットを選んで計算を始めてください。');
}

// ============================================================
//  認証
// ============================================================
function initAuth(){
  if(!window.__fb){window.addEventListener('fbReady',initAuth,{once:true});return;}
  fb().onAuthStateChanged(fb().auth,function(user){
    if(user){showApp();}else{showLogin();}
  });
}

function showLogin(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('mainApp').style.display='none';
}

function showApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  // ウェルカムメッセージ
  if(document.getElementById('chatArea').children.length===0){
    appendMsg('bot','🏗️ 大工AI計算チャットへようこそ！\n\n上のプリセットから計算タイプを選ぶか、自由に質問してください。\n\n例：\n・「4.5寸勾配で軒450mmの破風長さは？」\n・「階高2765mmで13段の蹴上げは？」\n・「準防火住宅の外壁仕様を教えて」');
    showQuickBtns(PRESETS.free.quickBtns);
  }
}

async function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  var err=document.getElementById('l-err');
  err.textContent='';
  if(!email||!pass){err.textContent='メールアドレスとパスワードを入力してください';return;}
  try{
    await fb().signInWithEmailAndPassword(fb().auth,email,pass);
  }catch(e){
    var msgs={'auth/user-not-found':'ユーザーが見つかりません','auth/wrong-password':'パスワードが違います','auth/invalid-email':'メールアドレスが無効です','auth/too-many-requests':'しばらくお待ちください'};
    err.textContent=msgs[e.code]||'ログインエラー: '+e.code;
  }
}

async function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  await fb().signOut(fb().auth);
}

document.addEventListener('DOMContentLoaded',function(){
  initAuth();
  // mainApp flex設定
  document.getElementById('mainApp').style.flexDirection='column';
});
</script>
